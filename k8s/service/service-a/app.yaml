apiVersion: apps/v1
kind: Deployment
metadata:
  name: servicea
spec:
  replicas: 1
  selector:
    matchLabels:
      app: servicea
  template:
    metadata:
      labels:
        app: servicea
    spec:
      containers:
        - name: servicea
          image: embarkx/tax-service-a:latest

          env:
            - name: TAX_SERVICE_URL
              value: "http://serviceb:4000"

          ports:
            - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: servicea
spec:
  selector:
    app: servicea
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 32110
