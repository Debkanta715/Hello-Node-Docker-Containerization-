apiVersion: apps/v1
kind: Deployment
metadata:
  name: serviceb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: serviceb
  template:
    metadata:
      labels:
        app: serviceb
    spec:
      containers:
        - name: serviceb
          image: embarkx/tax-service-b:latest

          # env:
          #   - name: APP_MESSAGE
          #     value: "Hello from app.yaml"
          #   - name: DB_PASSWORD
          #     value: "3Gjhdug"

          ports:
            - containerPort: 4000

---
apiVersion: v1
kind: Service
metadata:
  name: serviceb
spec:
  selector:
    app: serviceb
  type: ClusterIP
  ports:
    - port: 4000
      targetPort: 4000
