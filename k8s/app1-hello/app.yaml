apiVersion: apps/v1
kind: Deployment
metadata:
  name: serviceb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: serviceb
  template:
    metadata:
      labels:
        app: serviceb
    spec:
      containers:
        - name: serviceb
          image: embarkx/tax-service-b:latest

          env:
            - name: APP_MESSAGE
              value: "Hello from app.yaml"
            - name: DB_PASSWORD
              value: "3Gjhdug"

          # env:
          #   - name: APP_MESSAGE
          #     valueFrom:
          #       configMapKeyRef:
          #         name: app-config
          #         key: APP_MESSAGE
          #   - name: DB_PASSWORD
          #     valueFrom:
          #       secretKeyRef:
          #         name: db-secret
          #         key: DB_PASSWORD

          ports:
            - containerPort: 4000

---
apiVersion: v1
kind: Service
metadata:
  name: serviceb
spec:
  selector:
    app: serviceb
  type: NodePort
  ports:
    - port: 4000
      targetPort: 4000
      nodePort: 32200
